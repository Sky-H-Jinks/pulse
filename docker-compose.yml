# Pulse — local development stack
# Phase 0: only Postgres runs. Uncomment each service as its Dockerfile lands.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev   # local dev only
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Phase 1 ---------------------------------------------------------
  control-plane:
    build: ./control-plane
    ports: ["5000:5000"]
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=pulse;Username=pulse;Password=pulse_dev"
    depends_on:
      postgres: { condition: service_healthy }

  # dashboard:
