name: control-plane

on:
  push:
    branches: [main]
    paths:
      - "control-plane/**"
      - ".github/workflows/control-plane.yml"
  pull_request:
    paths:
      - "control-plane/**"
      - ".github/workflows/control-plane.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Testcontainers needs Docker, which ubuntu-latest runners provide.
      - run: dotnet test
        working-directory: control-plane
